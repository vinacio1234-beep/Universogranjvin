<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Grátis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        p {
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: #38bdf8;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Meu Novo Site</h1>
        <p>Este site foi criado com sucesso e está hospedado de forma 100% gratuita usando o Cloudflare Pages e o GitHub!</p>
        <a href="https://github.com" target="_blank" class="btn">Acessar Meu GitHub</a>
    </div>

</body>
</html>
